<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Carnet terrain" />
  <title>Carnet terrain hors ligne</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Prototype PWA hors ligne</p>
        <h1>Carnet terrain smartphone</h1>
        <p class="subtitle">Saisie locale sans 4G, sans application tierce, avec export CSV.</p>
      </div>
      <div class="hero-actions">
        <span id="netBadge" class="badge offline">Hors ligne</span>
        <button id="installBtn" class="btn secondary hidden">Installer</button>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <h2>Nouvelle saisie</h2>
        <form id="entryForm">
          <div class="form-grid">
            <label>
              Date et heure
              <input id="entryDate" name="entryDate" type="datetime-local" required />
            </label>
            <label>
              Opérateur
              <input id="operator" name="operator" type="text" placeholder="Nom ou initiales" required />
            </label>
            <label>
              Site
              <input id="site" name="site" type="text" placeholder="Parcelle, lieu..." required />
            </label>
            <label>
              Échantillon
              <input id="sample" name="sample" type="text" placeholder="Code prélèvement" required />
            </label>
            <label>
              Valeur
              <input id="value" name="value" type="number" step="0.01" placeholder="Ex. 12.4" required />
            </label>
            <label>
              Unité
              <input id="unit" name="unit" type="text" value="mg/L" required />
            </label>
          </div>

          <label>
            Commentaire
            <textarea id="comment" name="comment" rows="3" placeholder="Observation terrain, météo, remarque..."></textarea>
          </label>

          <div class="actions">
            <button class="btn primary" type="submit">Enregistrer</button>
            <button class="btn" type="reset">Effacer le formulaire</button>
          </div>
        </form>
        <p id="flash" class="flash" aria-live="polite"></p>
      </section>

      <section class="card">
        <h2>Résumé local</h2>
        <div class="stats">
          <div><span id="countAll">0</span><small>saisies</small></div>
          <div><span id="countPending">0</span><small>à synchroniser</small></div>
          <div><span id="countSynced">0</span><small>synchronisées</small></div>
        </div>
        <div class="actions stack-on-mobile">
          <button id="exportCsvBtn" class="btn success" type="button">Exporter CSV</button>
          <button id="exportJsonBtn" class="btn secondary" type="button">Exporter JSON</button>
          <button id="clearBtn" class="btn danger" type="button">Vider la mémoire</button>
        </div>
        <p class="hint">La mémoire locale reste disponible même si le smartphone perd le réseau.</p>
      </section>

      <section class="card full-width">
        <div class="list-header">
          <h2>Historique</h2>
          <button id="reloadBtn" class="btn" type="button">Actualiser</button>
        </div>
        <div id="entries" class="entries"></div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
